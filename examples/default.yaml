name: tb2d
ui:
  accent: light-magenta
  muted: dark-gray
  selection_fg: black
  selection_bg: white
  status_fg: white
  status_bg: blue
gap: 2
peek: 3
wrap_columns: true
columns:
  - name: welcome
    layout: fit
    width: medium
    panes:
      - name: welcome
        command: "printf 'TB2D\\n\\nWelcome to your terminal workspace.\\n\\nNavigate: Alt+h/j/k/l\\nZoom pane: Alt+z\\nControl mode: Alt+p\\nNew pane/column: Alt+p then n/c\\nResize column: Alt+- / Alt+=\\nCycle layout: Alt+m\\nExit: Ctrl+q\\n\\n'; exec ${SHELL:-sh}"
      - name: home
        command: "ls -la ~; exec ${SHELL:-sh}"
  - name: main
    layout: fit
    width: big
    panes:
      - name: terminal
        command: "${SHELL:-sh}"
  - name: carousel
    layout: carousel
    width: medium
    panes:
      - name: one
        command: "${SHELL:-sh}"
      - name: two
        command: "${SHELL:-sh}"
      - name: three
        command: "${SHELL:-sh}"
  - name: Agent
    layout: fit
    width: big
    panes:
      - name: terminal
        command: "${SHELL:-sh}"
