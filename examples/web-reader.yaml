name: web-reader
ui:
  accent: light-magenta
  muted: dark-gray
  selection_fg: black
  selection_bg: white
  status_fg: white
  status_bg: blue
gap: 2
peek: 3
wrap_columns: true
presets:
  small: 34
  medium: 52
  big: 76
columns:
  - name: editor
    layout: fit
    width: big
    panes:
      - name: editor
        command: "${EDITOR:-vi}"
  - name: agent
    layout: carousel
    width: "55% min=42 max=72"
    panes:
      - name: shell
        command: "${SHELL:-sh}"
  - name: feedback
    layout: carousel
    width: medium
    panes:
      - name: tests
        command: "printf 'Run tests here\\n'; exec ${SHELL:-sh}"
      - name: logs
        command: "printf 'Tail logs here\\n'; exec ${SHELL:-sh}"
  - name: services
    layout: fit
    width: small
    panes:
      - name: preview
        command: "printf 'Start preview here\\n'; exec ${SHELL:-sh}"
      - name: database
        command: "printf 'Open database console here\\n'; exec ${SHELL:-sh}"
