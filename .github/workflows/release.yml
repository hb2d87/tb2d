name: release

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.os }} archive
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-latest
            platform: macos-aarch64

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: test
        run: cargo test --locked --lib
        env:
          CARGO_TERM_COLOR: always

      - name: build release binary
        run: cargo build --locked --release
        env:
          CARGO_TERM_COLOR: always

      - name: check installer syntax
        run: sh -n scripts/install.sh

      - name: check release packager syntax
        run: python3 -m py_compile scripts/package-release.py

      - name: package release archives
        run: |
          python3 scripts/package-release.py \
            --binary target/release/tb2d \
            --out-dir dist \
            --version "${GITHUB_REF_NAME}" \
            --platform "${{ matrix.platform }}"

      - name: upload packaged archives
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: publish release assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: download packaged archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.zip
